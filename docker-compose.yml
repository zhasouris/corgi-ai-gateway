services:
  router:
    build: .
    # Pinned so the container keeps a stable, predictable name across recreates
    # rather than a generated <project>-router-1.
    container_name: corgi-ai-gateway
    ports:
      - "8000:8000"
    # Secrets are read from .env at the repo root (gitignored). Compose passes
    # them into the container explicitly — the container's working dir is /app,
    # not the host root (ADR: keys live at repo root, wired through here).
    env_file:
      - .env
    environment:
      # Where the RouteLLM sidecar lives (used only when RouteLLM is enabled).
      ROUTELLM_URL: http://routellm-sidecar:8001
    volumes:
      # Mount config read-only so catalog/strategy/server edits don't need a rebuild.
      - ./config:/app/config:ro
    restart: unless-stopped

  # RouteLLM signal sidecar (ADR 0006). Heavy (pulls PyTorch + model weights), so
  # it's opt-in via a profile. To show RouteLLM's win-rate in the demo:
  #   docker compose --profile routellm up -d --build
  #   then set ROUTELLM_ENABLED=true in .env (or routellm.enabled in server.yaml)
  routellm-sidecar:
    build: ./sidecar
    # The router reaches the sidecar at this hostname (see ROUTELLM_URL above),
    # so the name is part of the contract, not cosmetic.
    container_name: routellm-sidecar
    profiles: ["routellm"]
    env_file:
      - .env # OPENAI_API_KEY — the mf router embeds prompts via OpenAI
    expose:
      - "8001"
    restart: unless-stopped
